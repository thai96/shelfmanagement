spring.datasource.url=jdbc:postgresql://postgres_db:5432/my_database
spring.datasource.username=my_user
spring.datasource.password=my_password

spring.datasource.read_url=jdbc:postgresql://postgres_db:5433/my_database
spring.datasource.read_username=my_user
spring.datasource.read_password=my_password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
