version: "3.9"

networks:
  app-net:
    driver: bridge

volumes:
  db-data:

services:
  inventoryservice:
    container_name: inventoryservice
    build:
      context: ./inventoryservice
      dockerfile: Dockerfile
    image: thaipham/inventoryservice
    ports:
      - "1999:1999"
    networks:
      - app-net
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
    depends_on:
      pg-master:
        condition: service_healthy
      pg-slave-1:
        condition: service_healthy
      pg-slave-2:
        condition: service_healthy
      pg-slave-3:
        condition: service_healthy
      pg-slave-4:
        condition: service_healthy
      pg-slave-5:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1999/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

